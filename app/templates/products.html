{% extends "base.html" %}
{% block title %}Products — BillPOS{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/products.css') }}">
{% endblock %}

{% block content %}
<main class="chat-main w-100 products-root">

    <div class="products-toolbar">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search products...">
        </div>
        <select id="filterCategory" class="toolbar-filter-select">
            <option value="">All Categories</option>
        </select>
        <div style="margin-left:auto;display:flex;gap:8px;">
            <button class="btn-add-item sm" onclick="openAddModal()" style="padding: 7px 14px;">
                <i class="fa-solid fa-plus"></i> New
            </button>
            <button class="toolbar-icon-btn" title="Refresh" onclick="loadProducts()">
                <i class="fa-solid fa-arrows-rotate"></i>
            </button>
        </div>
    </div>

    <div class="table-container">
        <table id="productsTable" class="table w-100 mb-0">
            <thead><tr>
                <th style="width:60px;">Image</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th style="text-align:right;">Actions</th>
            </tr></thead>
            <tbody></tbody>
        </table>
    </div>

</main>

<!-- Add/Edit Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">New Product</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="form-label">Product Name *</label>
                    <input type="text" id="fName" class="form-control" placeholder="e.g. Chicken Burger">
                </div>
                <div class="mb-3">
                    <label class="form-label">Category *</label>
                    <input type="text" id="fCategory" class="form-control" placeholder="e.g. Fast Food">
                </div>
                <div class="mb-3">
                    <label class="form-label">Price (₹) *</label>
                    <input type="number" id="fPrice" class="form-control" placeholder="0.00" step="0.01" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">Product Image</label>
                    <input type="file" id="fImage" class="form-control" accept="image/*">
                    <div id="imagePreviewWrap" style="margin-top:10px;display:none;">
                        <img id="imagePreview" src="" class="img-preview" style="width:80px;height:80px;">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" data-bs-dismiss="modal">Cancel</button>
                <button class="btn-modal-primary" onclick="saveProduct()" id="saveLabel">Create Product</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete Product?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p style="font-size:0.85rem;color:var(--slate-500);margin:0;" id="deleteDesc"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" data-bs-dismiss="modal">Cancel</button>
                <button class="btn-danger-modal" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<div class="toast-stack" id="toastStack"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='js/products.js') }}"></script>
{% endblock %}
