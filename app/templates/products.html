{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/products.css') }}">
{% endblock %}

{% block content %}
<div class="products-page">

  <!-- Toolbar: search + filter -->
  <div class="prod-toolbar">
    <div class="prod-search">
      <i class="fas fa-search"></i>
      <input type="text" id="productSearch" placeholder="Search products…" autocomplete="off">
    </div>
    <button class="filter-btn" id="filterBtn" onclick="ProductApp.openFilterSheet()" title="Filter" aria-label="Filter products">
      <i class="fas fa-sliders-h"></i>
      <span class="filter-dot" id="filterDot" style="display:none;"></span>
    </button>
  </div>
  <!-- Section header -->
  <div class="section-header">
    <span class="section-title">Products</span>
    <span class="prod-total-label" id="visibleCount">0 items</span>
  </div>

  <!-- Grid -->
  <div class="products-grid" id="productsGrid">
    <!-- Skeletons while loading -->
    <div class="skel-card">
      <div class="skel" style="width:90px;height:90px;border-radius:16px;flex-shrink:0;"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:9px;">
        <div class="skel" style="height:14px;width:58%;"></div>
        <div class="skel" style="height:11px;width:35%;"></div>
        <div class="skel" style="height:22px;width:42%;margin-top:4px;border-radius:8px;"></div>
      </div>
    </div>
    <div class="skel-card">
      <div class="skel" style="width:90px;height:90px;border-radius:16px;flex-shrink:0;"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:9px;">
        <div class="skel" style="height:14px;width:52%;"></div>
        <div class="skel" style="height:11px;width:40%;"></div>
        <div class="skel" style="height:22px;width:48%;margin-top:4px;border-radius:8px;"></div>
      </div>
    </div>
    <div class="skel-card">
      <div class="skel" style="width:90px;height:90px;border-radius:16px;flex-shrink:0;"></div>
      <div style="flex:1;display:flex;flex-direction:column;gap:9px;">
        <div class="skel" style="height:14px;width:65%;"></div>
        <div class="skel" style="height:11px;width:30%;"></div>
        <div class="skel" style="height:22px;width:38%;margin-top:4px;border-radius:8px;"></div>
      </div>
    </div>
  </div>

</div>

<!-- FAB: Add Product (bottom-right fixed) -->
<button class="fab-add" onclick="ProductApp.openAddModal()" title="Add Product" aria-label="Add Product">
  <i class="fas fa-plus"></i>
</button>

<!-- ── Add / Edit Modal ── -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Add Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editProductId">
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:.82rem;color:#475569;">Product Name <span class="text-danger">*</span></label>
          <input type="text" id="fName" class="form-control" placeholder="e.g. Chicken Burger">
        </div>
        <div class="row g-3">
          <div class="col-6">
            <label class="form-label fw-semibold" style="font-size:.82rem;color:#475569;">Category <span class="text-danger">*</span></label>
            <input type="text" id="fCategory" class="form-control" list="catSuggestions" placeholder="e.g. Fast Food">
            <datalist id="catSuggestions"></datalist>
          </div>
          <div class="col-6">
            <label class="form-label fw-semibold" style="font-size:.82rem;color:#475569;">Price (₹) <span class="text-danger">*</span></label>
            <input type="number" id="fPrice" class="form-control" placeholder="0.00" step="0.01" min="0">
          </div>
        </div>
        <div class="mt-4 image-upload-section">
          <label class="form-label fw-bold text-center w-100" style="font-size:.85rem;color:#64748b;">Product Image</label>
          <div class="image-pick-zone" onclick="document.getElementById('fImage').click()">
            <input type="file" id="fImage" hidden accept="image/*">
            <div id="imagePlaceholder" class="text-center">
              <i class="fas fa-camera image-pick-icon"></i>
              <div style="font-size:0.7rem;color:#94a3b8;margin-top:4px;font-weight:600;">Click to upload</div>
            </div>
            <img id="imagePreview" src="" style="display:none;">
            <div class="image-pick-label">
              <i class="fas fa-sync-alt"></i>
              <span>Change Image</span>
            </div>
          </div>
          <div style="font-size:0.75rem;color:#94a3b8;font-weight:500;">Recommended: 1:1 Aspect Ratio</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-cancel" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-modal-primary" id="saveProductBtn" onclick="ProductApp.save()">Create Product</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Delete Confirm Modal ── -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Delete Product?</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p style="font-size:.83rem;color:#64748b;margin:0;" id="deleteDesc">This action cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-cancel" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-danger-modal" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Filter Bottom Sheet ── -->
<div class="filter-overlay" id="filterOverlay" onclick="ProductApp.closeFilterSheet()"></div>
<div class="filter-sheet" id="filterSheet">
  <div class="filter-sheet-handle"></div>
  <div class="filter-sheet-header">
    <h5 class="filter-sheet-title">Search Filter</h5>
    <button class="filter-sheet-close" onclick="ProductApp.closeFilterSheet()">
      <i class="fas fa-times"></i>
    </button>
  </div>
  <div class="filter-sheet-body">
    <div class="filter-section">
      <div class="filter-section-label">Category</div>
      <div class="filter-cat-grid" id="filterCatGrid">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>
  <div class="filter-sheet-footer">
    <button class="filter-apply-btn" onclick="ProductApp.applyFilter()">Apply Filter</button>
    <button class="filter-cancel-btn" onclick="ProductApp.resetFilter()">Reset All</button>
  </div>
</div>

{% endblock %}

{% block scripts %}  
<script src="{{ url_for('static', path='js/products.js') }}"></script>
{% endblock %}
