{% extends "base.html" %}

{% block title %}Receipt Settings — BillPOS{% endblock %}

{% block content %}
<div class="settings-page">


    <div class="settings-section active" style="padding: 16px;">
        <div class="section-group-label">Footer Messages</div>
        <div class="slist-card">
            <div class="slist-row stacked">
                <span class="slist-stacked-label">Thank You Message</span>
                <input type="text" class="slist-input" id="thankYouMsg" value="{{ settings.thank_you_msg or '' }}" 
                       placeholder="Thank you for visiting!" oninput="markUnsaved()">
            </div>
            <div class="slist-row stacked">
                <span class="slist-stacked-label">Receipt Footer</span>
                <input type="text" class="slist-input" id="receiptFooter" value="{{ settings.receipt_footer or '' }}" 
                       placeholder="Have a great day!" oninput="markUnsaved()">
            </div>
        </div>

        <div class="section-group-label">Print Options</div>
        <div class="slist-card">
            <div class="slist-row">
                <div class="slist-icon" style="background:#6366f1"><i class="fa-solid fa-print"></i></div>
                <span class="slist-label"><span class="slist-label-text">Paper Width (mm)</span></span>
                <input type="text" class="slist-input" id="paperWidth" value="{{ settings.paper_width or '80' }}"
                       style="width:50px" oninput="markUnsaved()">
            </div>
        </div>
    </div>
</div>

<button class="save-fab" id="saveFab" onclick="SettingsApp.saveReceipt()">
    <i class="fa-solid fa-floppy-disk"></i> Save Changes
</button>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='js/settings.js') }}"></script>
{% endblock %}
