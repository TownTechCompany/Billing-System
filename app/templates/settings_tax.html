{% extends "base.html" %}

{% block title %}Tax & GST — BillPOS{% endblock %}

{% block content %}
<div class="settings-page">


    <div class="settings-section active" style="padding: 16px;">
        <div class="section-group-label">GST Configuration</div>
        <div class="slist-card">
            <div class="slist-row">
                <div class="slist-icon" style="background:#10b981">
                    <i class="fa-solid fa-hashtag"></i>
                </div>
                <span class="slist-label"><span class="slist-label-text">GSTIN Number</span></span>
                <input type="text" class="slist-input" id="gstin" value="{{ settings.gstin or '' }}"
                       placeholder="22AAAAA0000A1Z5" maxlength="15"
                       style="font-family:monospace;text-transform:uppercase;width:160px"
                       oninput="markUnsaved()">
            </div>
            <div class="slist-row">
                <div class="slist-icon" style="background:#6366f1">
                    <i class="fa-solid fa-c"></i>
                </div>
                <span class="slist-label"><span class="slist-label-text">CGST %</span></span>
                <input type="number" class="slist-input" id="cgst" value="{{ settings.cgst or 0 }}"
                       step="0.5" min="0" max="14" style="width:60px"
                       oninput="markUnsaved()">
            </div>
            <div class="slist-row">
                <div class="slist-icon" style="background:#8b5cf6">
                    <i class="fa-solid fa-s"></i>
                </div>
                <span class="slist-label"><span class="slist-label-text">SGST %</span></span>
                <input type="number" class="slist-input" id="sgst" value="{{ settings.sgst or 0 }}"
                       step="0.5" min="0" max="14" style="width:60px"
                       oninput="markUnsaved()">
            </div>
        </div>

        <div class="section-group-label">Rules</div>
        <div class="slist-card">
            <div class="slist-row">
                <div class="slist-icon" style="background:#f59e0b">
                    <i class="fa-solid fa-tag"></i>
                </div>
                <span class="slist-label">
                    <span class="slist-label-text">Prices are tax-inclusive</span>
                </span>
                <label class="toggle-switch">
                    <input type="checkbox" id="taxInclusive" {% if settings.tax_inclusive %}checked{% endif %} onchange="markUnsaved()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="slist-row">
                <div class="slist-icon" style="background:#ec4899">
                    <i class="fa-solid fa-circle-nodes"></i>
                </div>
                <span class="slist-label">
                    <span class="slist-label-text">Round off total</span>
                </span>
                <label class="toggle-switch">
                    <input type="checkbox" id="roundTotal" {% if settings.round_total %}checked{% endif %} onchange="markUnsaved()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
        </div>
        
        <div class="section-group-label">Discounts</div>
        <div class="slist-card">
            <div class="slist-row">
                <div class="slist-icon" style="background:#16a34a">
                    <i class="fa-solid fa-percent"></i>
                </div>
                <span class="slist-label">
                    <span class="slist-label-text">Allow discounts on orders</span>
                </span>
                <label class="toggle-switch">
                    <input type="checkbox" id="allowDiscount" {% if settings.allow_discount %}checked{% endif %} onchange="markUnsaved()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="slist-row">
                <div class="slist-icon" style="background:#d97706">
                    <i class="fa-solid fa-arrow-up-wide-short"></i>
                </div>
                <span class="slist-label">
                    <span class="slist-label-text">Max discount %</span>
                </span>
                <input type="number" class="slist-input" id="maxDiscount" value="{{ settings.max_discount or 0 }}"
                       min="0" max="100" style="width:60px"
                       oninput="markUnsaved()">
            </div>
        </div>
    </div>
</div>

<button class="save-fab" id="saveFab" onclick="saveTaxSettings()">
    <i class="fa-solid fa-floppy-disk"></i> Save Changes
</button>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='js/settings.js') }}"></script>
{% endblock %}
