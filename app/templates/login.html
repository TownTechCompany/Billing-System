<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - BillPOS</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.min.css" />
  <link rel="stylesheet" href="../static/css/styles.css" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
     body {
      font-family: 'Nunito', sans-serif;
      background: #dde6f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .field {
      margin-bottom: 16px;
    }
    
    .field:last-of-type {
      margin-bottom: 20px;
    }

    .check-row {
      margin: 18px 0 24px 0;
      display: flex;
      align-items: center;
    }

    .check-row label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      color: #6b7280;
      font-weight: 500;
      margin: 0;
    }

    .check-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #3b82f6;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .check-row input[type="checkbox"]:hover {
      accent-color: #2563eb;
    }

    .check-row label:hover {
      color: #374151;
    }

    .password-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-container input {
      width: 100%;
      padding-right: 40px;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 18px;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: #6b7280;
    }

    .password-toggle:active {
      color: #3b82f6;
    }
  </style>
</head>
<body>

<div class="phone">
  <div class="blob-header">
    <svg viewBox="0 0 340 210" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>
        <linearGradient id="hg" x1="0" y1="0" x2="340" y2="210" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#1a2f6e"/>
          <stop offset="60%"  stop-color="#3b5bdb"/>
          <stop offset="100%" stop-color="#7b9ef0"/>
        </linearGradient>
      </defs>
      <rect width="340" height="210" fill="url(#hg)"/>
      <circle cx="268" cy="52"  r="78" fill="rgba(255,255,255,0.08)"/>
      <circle cx="305" cy="128" r="50" fill="rgba(255,255,255,0.12)"/>
      <circle cx="230" cy="160" r="32" fill="rgba(255,255,255,0.18)"/>
      <circle cx="50"  cy="185" r="58" fill="rgba(255,255,255,0.07)"/>
    </svg>
    <div class="header-text">
      <h1>Welcome Back!</h1>
      <p>Sign in to your account</p>
    </div>
  </div>

  <div class="card-body">
    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="password-container">
          <input type="password" id="password" name="password" placeholder="Enter your password" required />
          <button type="button" class="password-toggle" id="passwordToggle" title="Show/Hide password">
            <i class="ri-eye-line" id="passwordIcon"></i>
          </button>
        </div>
      </div>
      <div class="check-row">
        <label><input type="checkbox" id="rememberMe" name="remember_me" /> Remember me</label>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Sign in</button>
    </form>
  </div>
</div>

<!-- Notification Containers -->
<div id="toastStack" class="toast-stack"></div>

<script src="../static/js/script.js"></script>
<script src="../static/js/common.js"></script>
<script src="../static/js/login.js"></script>

</body>
</html>
