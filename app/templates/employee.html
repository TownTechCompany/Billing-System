{% extends "base.html" %}
{% block title %}Employees — BillPOS{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/employee.css') }}">
{% endblock %}

{% block content %}
<main class="chat-main w-100 employees-root">

    <div class="employees-toolbar">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search employees...">
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;">
            <button class="btn-add-item sm" onclick="openAddModal()" style="padding: 7px 14px;">
                <i class="fa-solid fa-plus"></i> New
            </button>
            <button class="toolbar-icon-btn" title="Refresh" onclick="loadEmployees()">
                <i class="fa-solid fa-arrows-rotate"></i>
            </button>
        </div>
    </div>

    <div class="employees-grid" id="employeesGrid">
        <!-- Cards filled by JS -->
    </div>

    <div id="emptyState" class="empty-state" style="display:none">
        <div class="empty-icon"><i class="fa-regular fa-users"></i></div>
        <div class="empty-title">No employees found</div>
        <div class="empty-sub">Add your first employee to get started</div>
    </div>

</main>

<!-- Add/Edit Modal -->
<div class="modal fade" id="employeeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">New Employee</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="form-label">First Name *</label>
                    <input type="text" id="fFirstName" class="form-control" placeholder="e.g. John">
                </div>
                <div class="mb-3">
                    <label class="form-label">Last Name *</label>
                    <input type="text" id="fLastName" class="form-control" placeholder="e.g. Doe">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email *</label>
                    <input type="email" id="fEmail" class="form-control" placeholder="john@example.com">
                </div>
                <div class="mb-3" id="passwordField">
                    <label class="form-label">Password *</label>
                    <input type="password" id="fPassword" class="form-control" placeholder="••••••••">
                </div>
                <div class="mb-3">
                    <label class="form-label">Role *</label>
                    <select id="fRole" class="form-control">
                        <option value="">Select role</option>
                        <option value="Owner">Owner</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" data-bs-dismiss="modal">Cancel</button>
                <button class="btn-modal-primary" onclick="saveEmployee()" id="saveLabel">Create Employee</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete Employee?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p style="font-size:0.85rem;color:var(--slate-500);margin:0;" id="deleteDesc"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" data-bs-dismiss="modal">Cancel</button>
                <button class="btn-danger-modal" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>

<div class="toast-stack" id="toastStack"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='js/employees.js') }}"></script>
{% endblock %}
