{% extends "base.html" %}
{% block title %}Employees — BillPOS{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/employees.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.min.css" />
{% endblock %}

{% block content %}
<main class="chat-main w-100 employees-root">

    <div class="employees-header">
        <div class="employees-header-left">
            <h1>Employees</h1>
            <div class="sub"><span class="sub-dot"></span><span id="countBadge">—</span> employees</div>
        </div>
    </div>

    <div class="employees-toolbar">
        <div class="search-box">
            <i class="ri-search-line"></i>
            <input type="text" id="searchInput" placeholder="Search employee name or email...">
        </div>
        <select id="filterType" class="toolbar-filter-select">
            <option value="">All Employee Types</option>
            <option value="Owner">Owner</option>
            <option value="Admin">Admin</option>
        </select>
        <select id="filterStatus" class="toolbar-filter-select">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
        </select>
        <div style="margin-left:auto;display:flex;gap:8px;">
            <button class="toolbar-icon-btn" id="createEmpBtn" title="Create Employee">
                <i class="ri-add-line"></i>
            </button>
            <button class="toolbar-icon-btn" title="Refresh" onclick="loadEmployees()">
                <i class="ri-refresh-line"></i>
            </button>
        </div>
    </div>

    <div class="table-container">
        <table id="employeesTable" class="table w-100 mb-0">
            <thead><tr>
                <th>Employee Name</th>
                <th>Email</th>
                <th>Employee Type</th>
                <th>Status</th>
                <th style="text-align:right;">Actions</th>
            </tr></thead>
            <tbody></tbody>
        </table>
    </div>

</main>

<!-- Employee Form Sidebar -->
<div class="employee-form-sidebar" id="employeeFormSidebar">
    <div class="sidebar-content">
        <div class="sidebar-header d-flex justify-content-between align-items-center mb-4">
            <h5 class="mb-0" id="formTitle">Create Employee</h5>
            <button class="btn btn-link p-0" id="closeFormBtn">
                <i class="ri-close-line"></i>
            </button>
        </div>

        <form id="employeeForm">
            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" id="firstName" class="form-control" placeholder="First name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" id="lastName" class="form-control" placeholder="Last name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="Email address" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <input type="password" id="password" class="form-control" placeholder="Password" required>
                    <button type="button" class="btn btn-outline-secondary password-toggle" id="passwordToggle">
                        <i class="ri-eye-line"></i>
                    </button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Employee Type</label>
                <select id="employeeType" class="form-control" required>
                    <option value="">Select type</option>
                    <option value="Owner">Owner</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" id="isActive" class="form-check-input" checked>
                <label class="form-check-label" for="isActive">Active</label>
            </div>

            <button type="submit" class="btn btn-dark w-100 rounded-pill" id="submitBtn">
                Create Employee
            </button>
        </form>
    </div>
</div>

<!-- Overlay -->
<div class="form-overlay" id="formOverlay"></div>

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='js/common.js') }}"></script>
<script src="{{ url_for('static', path='js/employees.js') }}"></script>
{% endblock %}
