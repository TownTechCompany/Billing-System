{% extends "base.html" %}
{% block title %}Employees — BillPOS{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='css/employee.css') }}">
{% endblock %}

{% block content %}
<div class="employees-page">

    <div class="emp-toolbar">
        <div class="emp-search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Search employees..." autocomplete="off">
        </div>
    </div>
    
    <div class="section-header">
        <span class="section-title">Employees</span>
        <span class="emp-total-label" id="visibleCount">0 items</span>
    </div>

    <div class="employees-grid" id="employeesGrid">
        <!-- Skeletons while loading -->
        <div class="skel-card">
            <div class="skel" style="width:75px;height:75px;border-radius:18px;flex-shrink:0;"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:9px;">
                <div class="skel" style="height:14px;width:58%;"></div>
                <div class="skel" style="height:11px;width:35%;"></div>
                <div class="skel" style="height:14px;width:42%;margin-top:4px;border-radius:8px;"></div>
            </div>
        </div>
        <div class="skel-card">
            <div class="skel" style="width:75px;height:75px;border-radius:18px;flex-shrink:0;"></div>
            <div style="flex:1;display:flex;flex-direction:column;gap:9px;">
                <div class="skel" style="height:14px;width:52%;"></div>
                <div class="skel" style="height:11px;width:40%;"></div>
                <div class="skel" style="height:14px;width:48%;margin-top:4px;border-radius:8px;"></div>
            </div>
        </div>
    </div>

</div>

<!-- FAB: Add Employee -->
<button class="fab-add" onclick="openAddModal()" title="Add Employee" aria-label="Add Employee">
    <i class="fas fa-user-plus"></i>
</button>

<!-- Add/Edit Modal -->
<div class="modal fade" id="employeeModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">New Employee</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="form-label fw-semibold" style="font-size:.82rem;color:#475569;">First Name <span class="text-danger">*</span></label>
                    <input type="text" id="fFirstName" class="form-control" placeholder="e.g. John">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold" style="font-size:.82rem;color:#475569;">Last Name <span class="text-danger">*</span></label>
                    <input type="text" id="fLastName" class="form-control" placeholder="e.g. Doe">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold" style="font-size:.82rem;color:#475569;">Email <span class="text-danger">*</span></label>
                    <input type="email" id="fEmail" class="form-control" placeholder="john@example.com">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold" style="font-size:.82rem;color:#475569;">Password <span class="text-danger">*</span></label>
                    <div style="position: relative;">
                        <input type="password" id="fPassword" class="form-control" placeholder="••••••••" style="padding-right: 40px;">
                        <i class="fa-regular fa-eye" id="togglePassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #64748b;"></i>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" data-bs-dismiss="modal">Cancel</button>
                <button class="btn-modal-primary" onclick="saveEmployee()" id="saveLabel">Create Employee</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Delete Employee?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p style="font-size:.83rem;color:#64748b;margin:0;" id="deleteDesc"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" data-bs-dismiss="modal">Cancel</button>
                <button class="btn-danger-modal" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>
</div>


{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='js/employees.js') }}"></script>
{% endblock %}
